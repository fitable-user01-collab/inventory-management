<script>
var S = {
  stores:[], items:[], inventory:[], notifications:[], defaultItems:[], editDefaultItems:[], categories:[],
  currentStoreId:null, currentCategory:'', currentScreen:'staff',
  currentAdminTab:'stores',
  // ローカル編集用
  editItems:[], itemsDirty:false,
  defaultsDirty:false,
  notifyDirty:false,
  editCategories:[], categoriesDirty:false,
  pendingChanges:{}, staffDirty:false,
  storeStockMap:{}
};
var CATS = [];

function gasRun(fn,args){
  return new Promise(function(ok,ng){
    var r=google.script.run.withSuccessHandler(ok).withFailureHandler(ng);
    if(!args||args.length===0)r[fn]();
    else if(args.length===1)r[fn](args[0]);
    else if(args.length===2)r[fn](args[0],args[1]);
    else if(args.length===3)r[fn](args[0],args[1],args[2]);
    else if(args.length===4)r[fn](args[0],args[1],args[2],args[3]);
  });
}
function showLoader(v){var el=document.getElementById('loader');if(el)el.classList.toggle('hidden',!v)}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}

// ============================================================
// 未保存チェック
// ============================================================
function isDirty(){return S.staffDirty||S.itemsDirty||S.defaultsDirty||S.notifyDirty||S.categoriesDirty;}
function checkUnsaved(){
  if(!isDirty())return true;
  var ok=confirm('保存されていない変更があります。\n保存せずに移動しますか？');
  if(ok){
    resetEditStates();
    renderAll();
  }
  return ok;
}
function updateDirtyUI(){
  var m={
    staffUnsaved:S.staffDirty,
    itemsUnsaved:S.itemsDirty,
    defaultsUnsaved:S.defaultsDirty,
    notifyUnsaved:S.notifyDirty,
    categoriesUnsaved:S.categoriesDirty
  };
  Object.keys(m).forEach(function(id){var el=document.getElementById(id);if(el)el.style.display=m[id]?'inline':'none';});
}

// ============================================================
// 初期化
// ============================================================
function init(){
  showLoader(true);
  gasRun('initDatabase').then(function(){return gasRun('loadAllData',[null]);})
  .then(function(d){
    S.stores=d.stores||[];S.notifications=d.notifications||[];S.defaultItems=d.defaultItems||[];
    S.categories=d.categories||[];
    CATS = S.categories.map(function(c){return c.name;});
    if(S.stores.length>0){S.currentStoreId=S.stores[0].store_id;return gasRun('loadAllData',[S.currentStoreId]);}
    return d;
  }).then(function(d){
    if(d.items)S.items=d.items;if(d.inventory)S.inventory=d.inventory;
    if(d.notifications)S.notifications=d.notifications;
    if(d.categories){
      S.categories=d.categories;
      CATS = S.categories.map(function(c){return c.name;});
    }
    S.storeStockMap=d.storeStockMap||{};
    if(CATS.length>0 && !CATS.includes(S.currentCategory)) S.currentCategory = CATS[0];
    resetEditStates();renderAll();showLoader(false);
  }).catch(function(e){console.error(e);toast('読み込みエラー');showLoader(false);});
}

function reloadStoreData(){
  if(!S.currentStoreId){S.items=[];S.inventory=[];renderAll();return Promise.resolve();}
  showLoader(true);
  return gasRun('loadAllData',[S.currentStoreId]).then(function(d){
    S.items=d.items||[];S.inventory=d.inventory||[];S.stores=d.stores||[];
    S.notifications=d.notifications||[];S.defaultItems=d.defaultItems||[];
    S.categories=d.categories||[];
    CATS = S.categories.map(function(c){return c.name;});
    S.storeStockMap=d.storeStockMap||{};
    if(CATS.length>0 && !CATS.includes(S.currentCategory)) S.currentCategory = CATS[0];
    resetEditStates();renderAll();showLoader(false);
  }).catch(function(){showLoader(false);toast('読み込みエラー');});
}

function resetEditStates(){
  S.editItems=JSON.parse(JSON.stringify(S.items));
  S.editCategories=JSON.parse(JSON.stringify(S.categories));
  S.editDefaultItems=JSON.parse(JSON.stringify(S.defaultItems));
  S.pendingChanges={};
  S.staffDirty=false;S.itemsDirty=false;S.defaultsDirty=false;S.notifyDirty=false;S.categoriesDirty=false;
}

function renderAll(){
  renderStoreSelect();
  renderStaffCatTabs();
  renderStaffScreen();
  renderStaffChanges();
  renderAdminScreen();
  updateTransferOptions();
  updateDirtyUI();
}

function renderStoreSelect(){
  ['storeSelect','adminStoreSelect','notifyStoreJump'].forEach(function(id){
    var sel=document.getElementById(id);if(!sel)return;
    var val=sel.value;sel.innerHTML='';
    if(S.stores.length===0){sel.innerHTML='<option value="">店舗なし</option>';return;}
    S.stores.forEach(function(st){var o=document.createElement('option');o.value=st.store_id;o.textContent=st.store_name;sel.appendChild(o);});
    if(val&&S.stores.some(function(st){return st.store_id===val;}))sel.value=val;
    else if(S.currentStoreId)sel.value=S.currentStoreId;
  });
}

// ============================================================
// スタッフ画面（ローカル編集 → 一括保存）
// ============================================================
function getOriginalQty(itemId) {
  var inv = S.inventory.find(function(v){ return String(v.item_id)===String(itemId); });
  return inv ? Number(inv.quantity)||0 : 0;
}
function getDisplayQty(itemId) {
  return S.pendingChanges[itemId] !== undefined ? S.pendingChanges[itemId] : getOriginalQty(itemId);
}

function renderStaffCatTabs(){
  var container = document.getElementById('staffCatTabs');
  if(!container) return;
  container.innerHTML = '';
  
  S.categories.forEach(function(cat){
    var tab = document.createElement('div');
    tab.className = 'cat-tab';
    if(cat.name === S.currentCategory) tab.classList.add('active');
    tab.dataset.cat = cat.name;
    var icon = '📁';
    if(cat.name.indexOf('消耗品') !== -1) icon = '🧴';
    else if(cat.name.indexOf('プレゼント') !== -1 || cat.name.indexOf('紹介') !== -1) icon = '🎁';
    else if(cat.name.indexOf('機材') !== -1) icon = '🏋️';
    else if(cat.name.indexOf('商品欄') !== -1) icon = '📋';
    
    tab.textContent = icon + ' ' + cat.name;
    tab.addEventListener('click', function(){
      switchCategory(cat.name);
    });
    container.appendChild(tab);
  });
}

function renderStaffScreen(){
  var c=document.getElementById('itemsContainer');if(!c)return;c.innerHTML='';
  var filtered=S.items.filter(function(i){return i.category===S.currentCategory;});
  if(filtered.length===0){c.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-light)">商品がありません</div>';return;}
  var tbl=document.createElement('table');tbl.className='item-table';
  tbl.innerHTML='<thead><tr><th>商品名</th><th>元の数</th><th>変更後</th><th>単位</th><th colspan="2">増減</th><th>直接入力</th></tr></thead>';
  var tbody=document.createElement('tbody');
  
  filtered.forEach(function(item){
    var origQty=getOriginalQty(item.item_id);
    var newQty=getDisplayQty(item.item_id);
    var changed=S.pendingChanges[item.item_id]!==undefined;
    var min=Number(item.min_stock)||0;
    var isAlert=min>0&&newQty<min;
    
    // 店舗ごとの在庫テキストを生成
    var stockObj = S.storeStockMap && S.storeStockMap[item.name] ? S.storeStockMap[item.name] : {};
    var stockTexts = [];
    S.stores.forEach(function(st) {
      var sId = String(st.store_id);
      var sName = st.store_name;
      var qty = 0;
      if (stockObj[sId] !== undefined) {
        qty = stockObj[sId].qty;
      }
      
      // 開いている店舗かつpendingChangesがある場合は編集中の数値を反映
      if (sId === String(S.currentStoreId)) {
        var diff = newQty - origQty;
        qty = Math.max(0, qty + diff);
        stockTexts.push('<strong style="color:var(--primary)">' + sName + ':' + qty + '</strong>');
      } else {
        stockTexts.push(sName + ':' + qty);
      }
    });
    var storeStockHTML = '<span style="font-size:9px;color:var(--text-sub);font-weight:normal;display:block;white-space:normal;line-height:1.3;margin-top:2px">' +
      stockTexts.join(' / ') + '</span>';
    
    var tr=document.createElement('tr');if(isAlert)tr.className='alert';
    var newQtyCell=changed
      ? '<td class="td-qty" style="color:var(--primary);font-weight:700">'+newQty+'</td>'
      : '<td class="td-qty">-</td>';
      
    tr.innerHTML='<td class="td-name">'+item.name + storeStockHTML + '</td>'+
      '<td class="td-qty" style="color:var(--text-sub)">'+origQty+'</td>'+
      newQtyCell+
      '<td class="td-unit">'+item.unit+'</td>'+
      '<td><button class="btn-inc plus" data-id="'+item.item_id+'">+1</button></td>'+
      '<td><button class="btn-inc minus" data-id="'+item.item_id+'">-1</button></td>'+
      '<td class="td-direct"><input type="number" min="0" data-id="'+item.item_id+'" placeholder="直入力" value="'+(changed?newQty:'')+'"></td>';
    tr.querySelector('.btn-inc.plus').addEventListener('click',function(){changeLocal(this.dataset.id,1);});
    tr.querySelector('.btn-inc.minus').addEventListener('click',function(){changeLocal(this.dataset.id,-1);});
    tr.querySelector('.td-direct input').addEventListener('change',function(){
      var id=this.dataset.id;
      var v=parseInt(this.value,10);
      if(!isNaN(v)&&v>=0){
        if(v===getOriginalQty(id)){delete S.pendingChanges[id];}
        else{S.pendingChanges[id]=v;}
        S.staffDirty=Object.keys(S.pendingChanges).length>0;
        renderStaffScreen();renderStaffChanges();updateDirtyUI();
      }
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);c.appendChild(tbl);
}

function changeLocal(itemId,delta){
  var orig=getOriginalQty(itemId);
  var cur=getDisplayQty(itemId);
  var newVal=Math.max(0,cur+delta);
  if(newVal===orig){delete S.pendingChanges[itemId];}
  else{S.pendingChanges[itemId]=newVal;}
  S.staffDirty=Object.keys(S.pendingChanges).length>0;
  renderStaffScreen();renderStaffChanges();updateDirtyUI();
}

function renderStaffChanges(){
  var c=document.getElementById('staffChangesList');if(!c)return;
  var keys=Object.keys(S.pendingChanges);
  if(keys.length===0){
    c.innerHTML='<span class="none">差分なし</span>';
    return;
  }
  var html='';
  keys.forEach(function(id){
    var item=S.items.find(function(i){return String(i.item_id)===String(id);});
    var orig=getOriginalQty(id);
    var nv=S.pendingChanges[id];
    if(item)html+='<span>'+item.name+': '+orig+' → '+nv+item.unit+'</span>';
  });
  c.innerHTML=html;
}

function saveStaffInventory(){
  if(!S.currentStoreId){toast('店舗を選択');return;}
  var keys=Object.keys(S.pendingChanges);
  if(keys.length===0){toast('変更がありません');return;}
  var list=keys.map(function(id){return{item_id:id,quantity:S.pendingChanges[id]};});
  showLoader(true);
  gasRun('saveInventoryBatch',[S.currentStoreId,list]).then(function(r){
    if(r.success){toast('在庫を保存しました');reloadStoreData();}showLoader(false);
  }).catch(function(){showLoader(false);toast('保存エラー');});
}

function switchCategory(cat){S.currentCategory=cat;document.querySelectorAll('.cat-tab').forEach(function(t){t.classList.toggle('active',t.dataset.cat===cat);});renderStaffScreen();}
function switchStore(){if(!checkUnsaved())return;S.currentStoreId=document.getElementById('storeSelect').value;reloadStoreData();}

// ============================================================
// 店舗間移動
// ============================================================
function updateTransferOptions(){
  var fromSel = document.getElementById('tfFromStore');
  var toSel = document.getElementById('tfToStore');
  if(!fromSel || !toSel) return;
  var fromVal = fromSel.value;
  var toVal = toSel.value;
  
  fromSel.innerHTML = '';
  toSel.innerHTML = '';
  
  S.stores.forEach(function(st){
    var o1 = document.createElement('option'); o1.value = st.store_id; o1.textContent = st.store_name; fromSel.appendChild(o1);
    var o2 = document.createElement('option'); o2.value = st.store_id; o2.textContent = st.store_name; toSel.appendChild(o2);
  });
  
  if(fromVal && S.stores.some(function(s){return s.store_id===fromVal;})) fromSel.value = fromVal;
  else if(S.currentStoreId) fromSel.value = S.currentStoreId;
  
  if(toVal && S.stores.some(function(s){return s.store_id===toVal;})) toSel.value = toVal;
  else if(S.stores.length > 1) toSel.value = S.stores[1].store_id;
  
  updateTransferItems();
}

function updateTransferItems(){
  var fromStoreId = document.getElementById('tfFromStore').value;
  var itemSel = document.getElementById('tfItem');
  if(!itemSel) return;
  itemSel.innerHTML = '<option value="">商品を選択</option>';
  if(!fromStoreId) return;
  
  var names = [];
  if (S.storeStockMap) {
    Object.keys(S.storeStockMap).forEach(function(itemName) {
      var storeStock = S.storeStockMap[itemName][String(fromStoreId)];
      // 移動元店舗に商品があり、かつ在庫数が1以上の商品のみ抽出
      if (storeStock && storeStock.qty > 0) {
        names.push({ name: itemName, qty: storeStock.qty });
      }
    });
  }
  
  names.sort(function(a,b){ return a.name.localeCompare(b.name); }).forEach(function(item){
    var o = document.createElement('option');
    o.value = item.name;
    o.textContent = item.name + ' (現在:' + item.qty + ')';
    itemSel.appendChild(o);
  });
}

function executeTransfer(){
  var fromId = document.getElementById('tfFromStore').value;
  var toId = document.getElementById('tfToStore').value;
  var name = document.getElementById('tfItem').value;
  var qty = parseInt(document.getElementById('tfQty').value, 10);
  
  if(!fromId || !toId || !name || isNaN(qty) || qty <= 0){
    toast('正しく入力してください');
    return;
  }
  if(fromId === toId){
    toast('移動元と移動先が同じ店舗です');
    return;
  }
  
  showLoader(true);
  gasRun('transferStock', [fromId, toId, name, qty]).then(function(r){
    if(r.success){
      toast('在庫を移動しました');
      // サーバーからのレスポンスを即適用
      if(r.storeStockMap) S.storeStockMap = r.storeStockMap;
      if(r.allInv){
        S.inventory = r.allInv.filter(function(i){ return String(i.store_id)===String(S.currentStoreId); });
      }
      if(r.allItems){
        var catNames = S.categories.map(function(c){ return c.name; });
        S.items = r.allItems.filter(function(i){ return String(i.store_id)===String(S.currentStoreId); })
          .sort(function(a,b){ var ci=catNames.indexOf(a.category)-catNames.indexOf(b.category); return ci!==0?ci:(a.sort_order||0)-(b.sort_order||0); });
      }
      resetEditStates();
      renderAll();
      showLoader(false);
    } else {
      showLoader(false);
      toast('移動失敗: ' + (r.error || '不明なエラー'));
    }
  }).catch(function(e){
    showLoader(false);
    toast('エラーが発生しました');
  });
}

// ============================================================
// 画面切り替え
// ============================================================
function showAdmin(){if(!checkUnsaved())return;S.currentScreen='admin';document.getElementById('staffScreen').style.display='none';document.getElementById('adminScreen').style.display='block';reloadStoreData();}
function showStaff(){if(!checkUnsaved())return;S.currentScreen='staff';document.getElementById('adminScreen').style.display='none';document.getElementById('staffScreen').style.display='block';reloadStoreData();}
function switchAdminTab(tab){
  if(!checkUnsaved())return;S.currentAdminTab=tab;
  document.querySelectorAll('.admin-tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===tab);});
  document.querySelectorAll('.admin-panel').forEach(function(p){p.classList.toggle('active',p.id==='panel_'+tab);});
}

// ============================================================
// 管理者画面
// ============================================================
function renderAdminScreen(){
  renderStoreList();
  renderCategoriesPanel();
  renderItemColumns();
  renderDefaultColumns();
  renderNotifyPanel();
  updateDirtyUI();
}

function renderStoreList(){
  var tbody=document.getElementById('storeTableBody');if(!tbody)return;tbody.innerHTML='';
  S.stores.forEach(function(st){
    var tr=document.createElement('tr');
    tr.innerHTML='<td>'+st.store_name+'</td><td><button class="btn-sm btn-edit">編集</button> <button class="btn-sm btn-del">削除</button></td>';
    tr.querySelector('.btn-edit').addEventListener('click',function(){editStoreModal(st.store_id,st.store_name);});
    tr.querySelector('.btn-del').addEventListener('click',function(){deleteStoreConfirm(st.store_id,st.store_name);});
    tbody.appendChild(tr);
  });
}
function addStoreModal(){openModal('店舗を追加','<label>店舗名</label><input type="text" id="modalInput1" placeholder="例: 渋谷店">',function(){
  var name=document.getElementById('modalInput1').value.trim();if(!name){toast('店舗名を入力');return;}
  showLoader(true);closeModal();
  gasRun('addStore',[name]).then(function(r){if(r.success){toast(name+'を追加');S.currentStoreId=r.storeId;reloadStoreData();}else showLoader(false);}).catch(function(){showLoader(false);toast('エラー');});
});}
function editStoreModal(id,name){openModal('店舗を編集','<label>店舗名</label><input type="text" id="modalInput1" value="'+name+'">',function(){
  var n=document.getElementById('modalInput1').value.trim();if(!n){toast('店舗名を入力');return;}
  showLoader(true);closeModal();
  gasRun('editStore',[id,n]).then(function(){toast('更新しました');reloadStoreData();}).catch(function(){showLoader(false);toast('エラー');});
});}
function deleteStoreConfirm(id,name){
  if(!confirm(name+'を削除しますか？\n関連データも全て削除されます。'))return;
  showLoader(true);
  gasRun('deleteStore',[id]).then(function(){toast(name+'を削除');if(S.currentStoreId===id)S.currentStoreId=null;reloadStoreData();}).catch(function(){showLoader(false);toast('エラー');});
}

// ============================================================
// カテゴリ管理
// ============================================================
function renderCategoriesPanel(){
  var c = document.getElementById('categoryListContainer');
  if(!c) return;
  c.innerHTML = '';
  if(S.editCategories.length === 0){
    c.innerHTML = '<div style="color:var(--text-light);padding:10px">カテゴリが登録されていません</div>';
    return;
  }
  S.editCategories.forEach(function(cat, idx){
    var div = document.createElement('div');
    div.className = 'cat-item';
    div.style.padding = '8px 10px';
    div.style.border = '1px solid var(--border)';
    div.style.borderRadius = 'var(--radius-sm)';
    div.style.background = '#fff';
    div.style.display = 'flex';
    div.style.alignItems = 'center';
    div.style.gap = '8px';
    
    div.innerHTML = '<div class="cat-item-order">' +
      '<button class="btn-order btn-up" style="font-size:10px">▲</button>' +
      '<button class="btn-order btn-down" style="font-size:10px">▼</button></div>' +
      '<div class="cat-item-info" style="flex:1"><input type="text" value="'+cat.name+'" style="padding:6px;width:100%;border:1px solid var(--border);border-radius:4px;font-size:13px" class="cat-name-input" data-idx="'+idx+'"></div>' +
      '<div class="cat-item-actions"><button class="btn-sm btn-del">削除</button></div>';
      
    div.querySelector('.btn-up').addEventListener('click', function(){ moveCategory(idx, -1); });
    div.querySelector('.btn-down').addEventListener('click', function(){ moveCategory(idx, 1); });
    div.querySelector('.btn-del').addEventListener('click', function(){ deleteCategoryLocal(idx); });
    div.querySelector('.cat-name-input').addEventListener('change', function(){
      S.editCategories[idx].name = this.value.trim();
      S.categoriesDirty = true;
      updateDirtyUI();
    });
    c.appendChild(div);
  });
}

function moveCategory(idx, dir){
  var swapIdx = idx + dir;
  if(swapIdx < 0 || swapIdx >= S.editCategories.length) return;
  var tmp = S.editCategories[idx];
  S.editCategories[idx] = S.editCategories[swapIdx];
  S.editCategories[swapIdx] = tmp;
  S.categoriesDirty = true;
  renderCategoriesPanel();
  updateDirtyUI();
}

function addCategoryLocal(){
  openModal('カテゴリを追加', '<label>カテゴリ名</label><input type="text" id="modalInput1" placeholder="例: プレゼント">', function(){
    var name = document.getElementById('modalInput1').value.trim();
    if(!name){ toast('カテゴリ名を入力してください'); return; }
    if(S.editCategories.some(function(c){ return c.name === name; })){ toast('既に存在するカテゴリ名です'); return; }
    
    S.editCategories.push({
      category_id: null,
      name: name,
      sort_order: S.editCategories.length + 1
    });
    S.categoriesDirty = true;
    closeModal();
    renderCategoriesPanel();
    updateDirtyUI();
  });
}

function deleteCategoryLocal(idx){
  var name = S.editCategories[idx].name;
  if(!confirm('カテゴリ「' + name + '」を削除しますか？\n※このカテゴリに属する商品は削除されませんが、表示するカテゴリが未設定になります。')) return;
  S.editCategories.splice(idx, 1);
  S.categoriesDirty = true;
  renderCategoriesPanel();
  updateDirtyUI();
}

function saveCategoriesUI(){
  if(S.editCategories.length === 0){ toast('最低1つのカテゴリが必要です'); return; }
  if(S.editCategories.some(function(c){ return !c.name; })){ toast('カテゴリ名が空の項目があります'); return; }
  
  showLoader(true);
  gasRun('saveCategories', [S.editCategories]).then(function(r){
    if(r.success){
      toast('カテゴリを保存しました');
      S.categoriesDirty = false;
      reloadStoreData();
    } else {
      showLoader(false);
      toast('保存失敗');
    }
  }).catch(function(){ showLoader(false); toast('エラー'); });
}

// ============================================================
// 商品マスター
// ============================================================
function renderItemColumns(){
  var container = document.getElementById('itemCatColumns');
  if(!container) return;
  container.innerHTML = '';
  
  S.categories.forEach(function(catObj){
    var cat = catObj.name;
    var col = document.createElement('div');
    col.className = 'cat-column';
    
    var header = document.createElement('div');
    header.className = 'cat-column-header';
    header.style.background = '#1e293b';
    header.style.color = '#fff';
    header.style.padding = '8px 12px';
    header.style.fontWeight = '600';
    header.style.fontSize = '13px';
    header.textContent = cat;
    col.appendChild(header);
    
    var body = document.createElement('div');
    body.className = 'cat-column-body';
    body.id = 'itemCol_' + cat;
    
    var catItems = S.editItems.filter(function(i){return i.category===cat;}).sort(function(a,b){return(a.sort_order||0)-(b.sort_order||0);});
    catItems.forEach(function(item){
      var div=document.createElement('div');div.className='cat-item';
      div.innerHTML='<div class="cat-item-order">'+
        '<button class="btn-order btn-up" title="上へ">▲</button>'+
        '<button class="btn-order btn-down" title="下へ">▼</button></div>'+
        '<div class="cat-item-info"><div class="cat-item-name">'+item.name+'</div><div class="cat-item-meta">'+item.unit+' / 下限:'+item.min_stock+'</div></div>'+

function moveItem(arr,item,cat,dir){
  var catItems=arr.filter(function(i){return i.category===cat;}).sort(function(a,b){return(a.sort_order||0)-(b.sort_order||0);});
  var idx=catItems.indexOf(item);if(idx<0)return;
  var swapIdx=idx+dir;if(swapIdx<0||swapIdx>=catItems.length)return;
  var tmp=item.sort_order;item.sort_order=catItems[swapIdx].sort_order;catItems[swapIdx].sort_order=tmp;
  S.itemsDirty=true;
  if(S.currentAdminTab==='items'){
    renderItemColumns();
  } else {
    renderDefaultColumns();
  }
  updateDirtyUI();
}

// ============================================================
function downloadInventoryCSV(){
  var btn = document.getElementById('btnExportCsv');
  if(btn){ btn.disabled = true; btn.textContent = '⏳ 生成中...'; }
  showLoader(true);
  gasRun('exportInventoryCSV').then(function(r){
    showLoader(false);
    if(btn){ btn.disabled = false; btn.innerHTML = '📥 在庫CSV出力'; }
    if(!r || !r.success){ toast('CSV出力に失敗しました: ' + (r && r.error ? r.error : '不明なエラー')); return; }
    // BOM付きUTF-8でExcelでも文字化けしない
    var bom = '\uFEFF';
    var blob = new Blob([bom + r.csv], {type: 'text/csv;charset=utf-8;'});
    var url  = URL.createObjectURL(blob);
    var now  = new Date();
    var pad  = function(n){ return ('0'+n).slice(-2); };
    var fileName = '在庫一覧_' +
      now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate()) + '_' +
      pad(now.getHours()) + pad(now.getMinutes()) + '.csv';
    var a = document.createElement('a');
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('CSVをダウンロードしました');
  }).catch(function(e){
    showLoader(false);
    if(btn){ btn.disabled = false; btn.innerHTML = '📥 在庫CSV出力'; }
    toast('CSV出力エラー');
    console.error(e);
  });
}
