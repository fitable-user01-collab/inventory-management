<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#f97316;--primary-dark:#ea580c;--primary-light:#fed7aa;
  --bg:#ffffff;--bg-card:#f8fafc;--bg-hover:#f1f5f9;
  --text:#1e293b;--text-sub:#64748b;--text-light:#94a3b8;
  --border:#e2e8f0;--danger:#ef4444;--danger-bg:#fef2f2;
  --success:#22c55e;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-lg:0 4px 12px rgba(0,0,0,.1);
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-tap-highlight-color:transparent}

.header{background:linear-gradient(135deg,#1e293b 0%,#334155 100%);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.header h1 .icon{font-size:20px}
.btn-admin{background:var(--primary);color:#fff;border:none;padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-admin:hover{background:var(--primary-dark)}

.store-selector{padding:8px 16px;background:var(--bg-card);border-bottom:1px solid var(--border)}
.store-selector select{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;background:#fff;color:var(--text);cursor:pointer}
.store-selector select:focus{border-color:var(--primary);outline:none}

.staff-note{padding:6px 16px;font-size:11px;color:var(--text-sub);background:#fffbeb;border-bottom:1px solid var(--border)}

/* ===== 共通パネルレイアウト ===== */
.screen-panel{display:flex;flex-direction:column;height:calc(100vh - 50px)}
.panel-fixed{flex-shrink:0;padding:10px 16px;background:#fff;border-bottom:1px solid var(--border);z-index:5}
.panel-scroll{flex:1;overflow-y:auto;padding:8px 12px;-webkit-overflow-scrolling:touch;padding-bottom:60px}

.save-bar{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.btn-save{background:#1e293b;color:#fff;border:none;padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-save:hover{background:#334155}
.btn-save:active{transform:scale(.95)}
.unsaved-warning{color:var(--danger);font-size:13px;font-weight:600;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

/* 変更箇所ボックス */
.changes-box{border:2px solid var(--primary);border-radius:var(--radius-sm);background:#fff8f0;padding:6px 10px;margin-top:4px}
.changes-box-title{font-size:11px;font-weight:700;color:var(--primary);margin-bottom:4px}
.changes-list{display:flex;flex-wrap:wrap;gap:4px;min-height:22px}
.changes-list span{display:inline-block;background:#fff;border:1.5px solid var(--primary);color:var(--primary-dark);padding:2px 8px;border-radius:10px;font-weight:600;font-size:11px}
.changes-list .none{color:var(--text-light);font-size:11px;font-weight:400;border:none;background:transparent;padding:0}

.cat-tabs{display:flex;gap:0;background:var(--bg-card);border-bottom:2px solid var(--border);padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cat-tab{flex:1;text-align:center;padding:10px 6px;font-size:13px;font-weight:500;color:var(--text-sub);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;min-width:70px;user-select:none}
.cat-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}

/* ===== スタッフ画面 ===== */
.item-table{width:100%;border-collapse:collapse;font-size:13px}
.item-table th{background:#f1f5f9;padding:8px 4px;text-align:left;font-weight:600;font-size:11px;color:var(--text-sub);border-bottom:2px solid var(--border);white-space:nowrap}
.item-table td{padding:6px 4px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
.item-table tr:hover td{background:var(--bg-hover)}
.item-table tr.alert td{background:var(--danger-bg)}
.item-table .td-name{font-weight:500;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:normal;word-break:break-all}
.item-table .td-qty{font-weight:700;font-size:15px;text-align:center;min-width:28px}
.item-table tr.alert .td-qty{color:var(--danger)}
.item-table .td-unit{color:var(--text-sub);font-size:11px}
.btn-inc{width:28px;height:28px;border:none;border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-inc:active{transform:scale(.9)}
.btn-inc.plus{background:#dcfce7;color:#16a34a;margin-right:2px}
.btn-inc.minus{background:#fee2e2;color:#dc2626}
.td-direct input{width:46px;padding:4px 2px;border:1.5px solid var(--border);border-radius:4px;text-align:center;font-size:12px;font-family:inherit}
.td-direct input:focus{border-color:var(--primary);outline:none}

/* ===== 店舗間移動ボックス ===== */
.transfer-box{background:#f8fafc;border:2px solid var(--primary-light);border-radius:var(--radius);padding:10px 14px;margin-top:6px}
.transfer-box-title{font-size:12px;font-weight:700;color:var(--primary-dark);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.transfer-form{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.transfer-form select, .transfer-form input{padding:6px 8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:inherit;background:#fff;color:var(--text)}
.transfer-form select:focus, .transfer-form input:focus{border-color:var(--primary);outline:none}
.btn-transfer{background:var(--primary);color:#fff;border:none;padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-transfer:hover{background:var(--primary-dark)}

/* ===== 管理者画面 ===== */
.admin-tabs{display:flex;overflow-x:auto;background:#f8fafc;border-bottom:2px solid var(--border);padding:0 8px;-webkit-overflow-scrolling:touch}
.admin-tab{padding:12px 14px;font-size:13px;font-weight:500;color:var(--text-sub);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s;user-select:none}
.admin-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}

.admin-panel{display:none}
.admin-panel.active{display:flex;flex-direction:column;height:calc(100vh - 96px)}

.admin-section{margin-bottom:24px}
.admin-section h3{font-size:16px;font-weight:600;margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.tbl th{background:#1e293b;color:#fff;padding:10px 12px;text-align:left;font-weight:500;font-size:12px;white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:hover td{background:var(--bg-hover)}
.btn-sm{padding:5px 10px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-sm:active{transform:scale(.93)}
.btn-edit{background:#dbeafe;color:#2563eb}.btn-edit:hover{background:#bfdbfe}
.btn-del{background:#fee2e2;color:#dc2626}.btn-del:hover{background:#fecaca}
.btn-add{background:var(--primary);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-add:hover{background:var(--primary-dark)}

/* 並び替えボタン */
.btn-order{width:24px;height:24px;border:none;border-radius:4px;background:var(--bg-hover);color:var(--text-sub);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.btn-order:hover{background:var(--border)}

/* 3カラムカテゴリ */
.cat-columns{display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.cat-column{min-width:280px;flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.cat-column-body{padding:8px}
.cat-item{display:flex;align-items:center;gap:6px;padding:8px 10px;border-bottom:1px solid var(--border);font-size:13px;transition:background .15s}
.cat-item:hover{background:var(--bg-hover)}
.cat-item:last-child{border-bottom:none}
.cat-item-info{flex:1}
.cat-item-name{font-weight:500}
.cat-item-meta{font-size:11px;color:var(--text-sub)}
.cat-item-actions{display:flex;gap:4px;align-items:center}
.cat-item-order{display:flex;flex-direction:column;gap:2px}

/* 通知カード */
.notify-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;scroll-margin-top:120px}
.notify-card h4{font-size:15px;font-weight:600;margin-bottom:10px}
.notify-card label{display:block;font-size:12px;font-weight:600;color:var(--text-sub);margin-bottom:4px;margin-top:10px}
.notify-card input,.notify-card textarea{width:100%;padding:8px 10px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit}
.notify-card input:focus,.notify-card textarea:focus{border-color:var(--primary);outline:none}
.notify-card textarea{min-height:50px;resize:vertical}

/* モーダル */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:var(--radius);width:100%;max-width:420px;box-shadow:var(--shadow-lg);overflow:hidden;animation:modalIn .2s ease}
@keyframes modalIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:16px;border-bottom:1px solid var(--border);font-size:16px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.modal-header .close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-sub);padding:4px}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:12px}
.modal-body label{font-size:13px;font-weight:500;color:var(--text-sub)}
.modal-body input,.modal-body select{padding:10px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit}
.modal-body input:focus,.modal-body select:focus{border-color:var(--primary);outline:none}
.modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.modal-footer .btn-cancel{background:var(--bg-hover);color:var(--text);border:none;padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;cursor:pointer}
.modal-footer .btn-ok{background:var(--primary);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer}

.loader-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.85);z-index:300;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loader-overlay.hidden{display:none}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:12px 24px;border-radius:var(--radius);font-size:14px;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1}

@media(max-width:600px){
  .cat-columns{flex-direction:column}
  .cat-column{min-width:unset}
}
</style>
